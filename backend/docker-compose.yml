  # One-off: docker compose run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    env_file:
      - cmd/server/.env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file:
      - cmd/server/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8082:8080"
    networks:
      - app-network
    env_file:
      - cmd/server/.env
    environment:
      - ADMINER_DESIGN=pepa-linha
      - ADMINER_DEFAULT_SERVER=postgres
      - ADMINER_DEFAULT_DB_NAME=${POSTGRES_DB:-postgres}
      - ADMINER_DEFAULT_USERNAME=${POSTGRES_USER:-postgres}
      - ADMINER_DEFAULT_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
