<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GateForge — Identity & Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <div
        class="boot-splash"
        role="status"
        aria-live="polite"
        aria-label="Loading GateForge"
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: transparent;
        "
      >
        <div
          class="boot-splash-mark"
          style="
            position: relative;
            width: 56px;
            height: 56px;
            animation: boot-enter 420ms cubic-bezier(0.22, 1, 0.36, 1) both;
          "
        >
          <span
            class="boot-splash-ring"
            aria-hidden="true"
            style="
              position: absolute;
              inset: -10%;
              border-radius: 9999px;
              border: 1.5px solid oklch(0.4 0.18 265 / 0.4);
              animation: boot-ring 1.6s ease-out 420ms infinite;
            "
          ></span>
          <img
            src="/gateforge-icon.webp"
            alt=""
            width="56"
            height="56"
            decoding="async"
            style="
              position: relative;
              z-index: 1;
              width: 56px;
              height: 56px;
              object-fit: contain;
              animation: boot-breathe 1.6s ease-in-out 420ms infinite;
            "
          />
        </div>
      </div>
    </div>
    <style>
      @keyframes boot-enter {
        from {
          opacity: 0;
          transform: scale(0.72);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes boot-breathe {
        0%,
        100% {
          transform: scale(1);
          filter: drop-shadow(0 0 0 transparent);
        }
        50% {
          transform: scale(1.06);
          filter: drop-shadow(0 0 12px oklch(0.4 0.18 265 / 0.35));
        }
      }
      @keyframes boot-ring {
        0% {
          opacity: 0.55;
          transform: scale(0.85);
        }
        70%,
        100% {
          opacity: 0;
          transform: scale(1.45);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-splash-mark,
        .boot-splash img,
        .boot-splash-ring {
          animation: none !important;
        }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
