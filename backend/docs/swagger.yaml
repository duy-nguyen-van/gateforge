        schema:
          $ref: '#/definitions/dtos.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'When MFA is off: LoginResponse. When MFA is on: same envelope
            but `data` is MFALoginChallengeResponse (see top-level description).'
          schema:
            properties:
              data:
                $ref: '#/definitions/dtos.LoginResponse'
              meta:
                $ref: '#/definitions/dtos.Meta'
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              meta:
                $ref: '#/definitions/dtos.Meta'
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              meta:
                $ref: '#/definitions/dtos.Meta'
            type: object
      summary: Login (dashboard/API) with email and password
      tags:
      - Auth
